<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Anime World</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0f1a,#1b1035,#000);
}

.login-box{
    width:350px;
    background:rgba(255,255,255,.08);
    padding:30px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    text-align:center;
}

h1{
    color:#fff;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#ff0066,#6a00ff);
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

a{
    color:white;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="login-box">
    <h1>Anime World Login</h1>

    <form>
        <input type="email" placeholder="Enter Email" required>
        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <br>

    <a href="hom.html">⬅ Back to Home</a>
</div>

</body>
</html>
